name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------
  # Hosted build + test
  # ---------------------------------------------------------------
  test:
    name: Test (hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --workspace
        name: Build

      - run: cargo test --workspace
        name: Test

      - run: cargo clippy --workspace -- -D warnings
        name: Clippy

      - run: cargo fmt --all -- --check
        name: Format check

  # ---------------------------------------------------------------
  # Validate test vectors against fresh Python generation
  # ---------------------------------------------------------------
  vectors:
    name: Validate test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: pip install rns
        name: Install Python RNS

      - run: python3 generate_test_vectors.py --out /tmp/vectors_fresh.json
        name: Regenerate vectors

      - name: Compare with committed vectors
        run: |
          python3 - << 'EOF'
          import json, sys
          def strip(d):
              return {k: v for k, v in d.items() if not k.startswith('_')}
          with open('tests/interop/vectors.json') as f:
              committed = strip(json.load(f))
          with open('/tmp/vectors_fresh.json') as f:
              fresh = strip(json.load(f))
          if committed != fresh:
              print("FAIL: committed vectors differ from freshly generated.")
              print("Run: python3 generate_test_vectors.py --out tests/interop/vectors.json")
              sys.exit(1)
          print("OK: vectors match.")
          EOF

  # ---------------------------------------------------------------
  # Embedded compile checks — no test execution, just verify it builds
  # ---------------------------------------------------------------
  embedded-rp2040:
    name: Build rete-core (RP2040)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - run: cargo build -p rete-core --target thumbv6m-none-eabi --release
        name: Build

  embedded-esp32s3:
    name: Build rete-core (ESP32-S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false

      - run: cargo build -p rete-core --target xtensa-esp32s3-none-elf --release
        name: Build
