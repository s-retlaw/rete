<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RETE Admin Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#111;color:#0f0;padding:16px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh}
h1{font-size:2em;letter-spacing:0.2em;margin-bottom:4px}
.sub{color:#080;margin-bottom:24px;font-size:0.9em}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:20px;width:100%;max-width:320px}
label{display:block;color:#080;font-size:0.85em;margin-bottom:4px}
input{width:100%;padding:8px;background:#222;border:1px solid #444;color:#0f0;font-family:monospace;font-size:1.1em;border-radius:4px;text-align:center;letter-spacing:0.3em}
input:focus{border-color:#0f0;outline:none}
button{width:100%;padding:10px;margin-top:12px;background:#0a0;color:#111;border:none;font-family:monospace;font-weight:bold;font-size:1em;border-radius:4px;cursor:pointer}
button:hover{background:#0c0}
.hint{color:#555;font-size:0.75em;text-align:center;margin-top:12px}
a{color:#0a0}
.nav{margin-bottom:16px;font-size:0.85em}
</style>
</head>
<body>
<h1>RETE</h1>
<p class="sub">Node Admin</p>
<div class="card">
<form method="POST" action="/admin/login">
<label>Password</label>
<input name="pw" type="password" placeholder="--------" maxlength="16" autofocus>
<button type="submit">Login</button>
</form>
<p class="hint">Check the OLED screen on the device for the password.</p>
</div>
<p class="nav" style="margin-top:16px"><a href="/">&#8592; Status Page</a></p>
</body>
</html>
