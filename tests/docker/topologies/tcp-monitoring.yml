networks:
  rete-lan:
    driver: bridge

services:
  rnsd:
    build:
      context: ..
      dockerfile: rnsd-node.Dockerfile
    networks:
      - rete-lan
    environment:
      - RNSD_PORT=4242
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',4242),1); s.close()"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  rust-node:
    build:
      context: ..
      dockerfile: rust-node.Dockerfile
    networks:
      - rete-lan
    stdin_open: true
    volumes:
      - ../../../target/debug/rete-linux:/opt/rete/rete-linux:ro
    command: --connect rnsd:4242 --monitoring 0.0.0.0:9100
    depends_on:
      rnsd:
        condition: service_healthy

  python-node:
    build:
      context: ..
      dockerfile: python-node.Dockerfile
    networks:
      - rete-lan
    volumes:
      - ../../interop:/opt/tests:ro
    command: /opt/tests/docker_py_helpers/tcp_node.py --host rnsd --port 4242
    depends_on:
      rnsd:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    networks:
      - rete-lan
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    depends_on:
      - rust-node
