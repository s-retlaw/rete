networks:
  rete-lan:
    driver: bridge

services:
  rnsd:
    build:
      context: ..
      dockerfile: rnsd-node.Dockerfile
    networks:
      - rete-lan
    environment:
      - RNSD_PORT=4242
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',4242),1); s.close()"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  rust-transport:
    build:
      context: ..
      dockerfile: rust-node.Dockerfile
    networks:
      - rete-lan
    volumes:
      - ../../../target/debug/rete:/opt/rete/rete:ro
    command: ["--data-dir", "/tmp/rete", "--connect", "rnsd:4242", "--transport"]
    depends_on:
      rnsd:
        condition: service_healthy

  python-a:
    build:
      context: ..
      dockerfile: python-node.Dockerfile
    networks:
      - rete-lan
    volumes:
      - ../../interop:/opt/tests:ro
    command: ["/opt/tests/docker_py_helpers/path_a_node.py", "--host", "rnsd", "--port", "4242"]
    depends_on:
      rnsd:
        condition: service_healthy

  python-c:
    build:
      context: ..
      dockerfile: python-node.Dockerfile
    networks:
      - rete-lan
    volumes:
      - ../../interop:/opt/tests:ro
    command: ["/opt/tests/docker_py_helpers/path_c_node.py", "--host", "rnsd", "--port", "4242", "--target-hash", "${TARGET_HASH:-0000000000000000000000000000000000000000}"]
    profiles:
      - late-join
    depends_on:
      rnsd:
        condition: service_healthy
